<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dariel — AI Companion</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--surface:#1a1a2e;--text-primary:#e8e8f0;--text-secondary:#9090b0;--accent:#7c8cf8;--accent-glow:rgba(124,140,248,.15);--border:#2a2a45;--danger:#ff6b7a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text-primary);height:100vh;display:flex;justify-content:center;align-items:center}
.app{width:100%;max-width:440px;height:100vh;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);border-right:1px solid var(--border)}
.header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header .title{font-size:18px;font-weight:700;letter-spacing:1px}
.header .status{font-size:12px;color:#4ade80;display:flex;align-items:center;gap:6px}
.header .status::before{content:'';width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mode-bar{display:flex;padding:8px 20px;gap:8px;border-bottom:1px solid var(--border)}
.mode-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;transition:all .2s}
.mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:85%;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.ai{align-self:flex-start}
.bubble{padding:12px 16px;border-radius:18px;line-height:1.5}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:6px}
.msg.ai .bubble{background:#1e1e3a;border:1px solid var(--border);border-bottom-left-radius:6px}
.bubble .en{font-style:italic;font-size:15px;color:var(--text-primary);margin-bottom:4px}
.bubble .zh{font-size:12px;color:var(--text-secondary)}
.msg.user .bubble .zh{color:rgba(255,255,255,.65);font-style:normal;margin-top:2px}
.msg .time{font-size:10px;color:var(--text-secondary);margin-top:4px;padding:0 8px}
.msg.user .time{text-align:right}
.typing{align-self:flex-start;padding:12px 16px;background:#1e1e3a;border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:6px;display:none;gap:4px}
.typing.visible{display:flex}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-secondary);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.call-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;flex-direction:column;align-items:center;justify-content:center}
.call-overlay.active{display:flex}
.call-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;animation:callPulse 2s ease infinite}
@keyframes callPulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}50%{box-shadow:0 0 0 20px transparent}}
.call-subtitle{color:var(--text-secondary);font-size:14px;margin-top:8px;max-width:300px;text-align:center}
.call-end{margin-top:40px;width:56px;height:56px;border-radius:50%;background:var(--danger);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px}
.call-end:hover{transform:scale(1.1)}
.input-area{padding:12px 16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.input-area textarea{flex:1;resize:none;padding:10px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;max-height:80px;transition:border-color .2s}
.input-area textarea:focus{border-color:var(--accent)}
.input-area textarea::placeholder{color:var(--text-secondary)}
.send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:hover{filter:brightness(1.1)}
.send-btn:disabled{opacity:.4;cursor:default}
.playing-indicator{display:none;align-items:center;gap:6px;padding:8px 16px;background:var(--accent-glow);margin:0 20px;border-radius:12px;font-size:12px;color:var(--accent)}
.playing-indicator.active{display:flex}
.wave{display:flex;gap:2px;align-items:flex-end;height:16px}
.wave span{width:2px;background:var(--accent);border-radius:1px;animation:wave .8s ease infinite}
.wave span:nth-child(1){height:40%}.wave span:nth-child(2){animation-delay:.1s;height:60%}.wave span:nth-child(3){animation-delay:.2s;height:80%}.wave span:nth-child(4){animation-delay:.3s;height:50%}.wave span:nth-child(5){animation-delay:.4s;height:70%}
@keyframes wave{0%,100%{height:30%}50%{height:100%}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
/* Settings Panel */
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90}
.settings-overlay.active{display:block}
.settings-panel{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:95;transition:right .3s ease;display:flex;flex-direction:column;overflow-y:auto}
.settings-panel.active{right:0}
.settings-panel .sp-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sp-header .sp-title{font-size:16px;font-weight:700}
.sp-header .sp-close{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:var(--text-secondary);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sp-header .sp-close:hover{background:var(--border)}
.sp-section{padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.05)}
.sp-section .sp-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.sp-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;cursor:pointer}
.sp-item .sp-item-left{display:flex;align-items:center;gap:10px}
.sp-item .sp-icon{width:20px;text-align:center;font-size:16px}
.sp-item .sp-name{font-size:14px;color:var(--text-primary)}
.sp-item .sp-desc{font-size:11px;color:var(--text-secondary)}
/* Toggle Switch */
.toggle{position:relative;width:44px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;cursor:pointer;inset:0;background:#3a3a5a;border-radius:26px;transition:.25s}
.toggle .slider::before{content:'';position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider::before{transform:translateX(18px)}
/* Action Buttons in Settings */
.sp-action{display:flex;align-items:center;gap:10px;padding:12px 0;cursor:pointer;border:none;background:none;color:var(--text-primary);font-size:14px;width:100%;text-align:left;font-family:inherit}
.sp-action:hover{color:var(--accent)}
.sp-action.danger{color:var(--danger)}
.sp-action.danger:hover{opacity:.8}
/* Gear Button */
.gear-btn{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:var(--text-secondary);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s}
.gear-btn:hover{transform:rotate(90deg);color:var(--text-primary)}
/* Multi-message queue */
.msg-queue{display:none;padding:8px 16px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.msg-queue.active{display:block}
.msg-queue .queue-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;margin:4px 0;background:var(--bg);border-radius:10px;font-size:13px;animation:fadeIn .2s ease}
.queue-item .queue-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary)}
.queue-item .queue-remove{width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:var(--danger);cursor:pointer;font-size:14px;flex-shrink:0}
.queue-actions{display:flex;gap:6px;margin-top:6px}
.queue-actions button{padding:5px 14px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:inherit}
.queue-actions button.send-all{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Emoji bar */
.emoji-bar{display:none;padding:6px 16px;gap:6px;border-top:1px solid var(--border);flex-wrap:wrap}
.emoji-bar.active{display:flex}
.emoji-bar button{width:34px;height:34px;border-radius:50%;border:none;background:transparent;font-size:18px;cursor:pointer;transition:transform .15s}
.emoji-bar button:hover{transform:scale(1.3);background:rgba(255,255,255,.05)}
/* Input toolbar */
.input-toolbar{display:flex;padding:0 16px 8px;gap:6px}
.input-toolbar button{width:30px;height:30px;border-radius:50%;border:none;background:transparent;color:var(--text-secondary);font-size:16px;cursor:pointer}
.input-toolbar button:hover{color:var(--text-primary);background:rgba(255,255,255,.05)}
.input-toolbar button.active{color:var(--accent)}</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">Dariel</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="status" id="connStatus">连接中...</div>
      <button class="gear-btn" onclick="toggleSettings()" title="设置">⚙</button>
    </div>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('chat')">💬 聊天</button>
    <button class="mode-btn" onclick="setMode('call')">📞 通话</button>
  </div>
  <div class="playing-indicator" id="playingIndicator">
    <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
    <span>播放中...</span>
  </div>
  <div class="messages" id="messages">
    <div class="msg ai">
      <div class="bubble">
        <div class="en">Hey baby! I'm all set up. 😊</div>
        <div class="zh">嘿宝贝！我都准备好了~</div>
      </div>
      <div class="time">刚刚</div>
    </div>
  </div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
  <div class="msg-queue" id="msgQueue"></div>
  <div class="emoji-bar" id="emojiBar">
    <button onclick="insertEmoji('😊')">😊</button><button onclick="insertEmoji('😂')">😂</button>
    <button onclick="insertEmoji('🥺')">🥺</button><button onclick="insertEmoji('❤️')">❤️</button>
    <button onclick="insertEmoji('✨')">✨</button><button onclick="insertEmoji('🔥')">🔥</button>
    <button onclick="insertEmoji('😭')">😭</button><button onclick="insertEmoji('💀')">💀</button>
    <button onclick="insertEmoji('👍')">👍</button><button onclick="insertEmoji('🎉')">🎉</button>
  </div>
  <div class="input-area">
    <textarea id="userInput" rows="1" placeholder="说点什么..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button class="send-btn" onclick="sendMessage()" id="sendBtn">↑</button>
  </div>
  <div class="input-toolbar">
    <button id="btnEmoji" onclick="toggleEmojiBar()" title="表情">😀</button>
    <button onclick="addToQueue()" title="加入队列">📋</button>
    <button onclick="importChat()" title="导入">📥</button>
    <button onclick="exportChat()" title="导出">📤</button>
  </div>
</div>
<div class="call-overlay" id="callOverlay">
  <div class="call-avatar">🌙</div>
  <div style="font-size:20px;font-weight:700;">Dariel</div>
  <div class="call-subtitle" id="callSubtitle">...</div>
  <button class="call-end" onclick="endCall()">📞</button>
</div>
<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="sp-header">
    <div class="sp-title">设置</div>
    <button class="sp-close" onclick="toggleSettings()">✕</button>
  </div>
  <div class="sp-section">
    <div class="sp-label">开关</div>
    <div class="sp-item" onclick="toggleSetting('call')">
      <div class="sp-item-left"><span class="sp-icon">📞</span><span class="sp-name">通话</span></div>
      <label class="toggle"><input type="checkbox" id="toggleCall"><span class="slider"></span></label>
    </div>
    <div class="sp-item" onclick="toggleSetting('watch')">
      <div class="sp-item-left"><span class="sp-icon">👁️</span><span class="sp-name">视监</span><span class="sp-desc" style="margin-left:4px">— 前端守望</span></div>
      <label class="toggle"><input type="checkbox" id="toggleWatch"><span class="slider"></span></label>
    </div>
    <div class="sp-item" onclick="toggleSetting('proactive')">
      <div class="sp-item-left"><span class="sp-icon">💬</span><span class="sp-name">主动消息</span><span class="sp-desc" style="margin-left:4px">— 5分钟未活动自动问候</span></div>
      <label class="toggle"><input type="checkbox" id="toggleProactive"><span class="slider"></span></label>
    </div>
    <div class="sp-item" onclick="toggleSetting('memory')">
      <div class="sp-item-left"><span class="sp-icon">🧠</span><span class="sp-name">记忆库</span><span class="sp-desc" style="margin-left:4px">— 自动写入记忆</span></div>
      <label class="toggle"><input type="checkbox" id="toggleMemory"><span class="slider"></span></label>
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-label">操作</div>
    <button class="sp-action" onclick="exportChat();toggleSettings()"><span class="sp-icon">📤</span> 导出聊天记录</button>
    <button class="sp-action" onclick="importChat();toggleSettings()"><span class="sp-icon">📥</span> 导入聊天记录</button>
    <button class="sp-action danger" onclick="clearHistory();toggleSettings()"><span class="sp-icon">🗑️</span> 清空记录</button>
    <button class="sp-action" onclick="toggleTheme()"><span class="sp-icon">🎨</span> 主题切换</button>
    <button class="sp-action danger" onclick="exitApp()"><span class="sp-icon">🚪</span> 退出</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>const API='http://127.0.0.1:8767';
let mode='chat',proactiveTimer=null,isProcessing=false;
let msgQueue=[];  // multi-message queue
let settings={call:false,watch:true,proactive:true,memory:true};

// Load settings from localStorage
try{const s=JSON.parse(localStorage.getItem('dariel_settings'));if(s)Object.assign(settings,s);}catch(e){}

function saveSettings(){localStorage.setItem('dariel_settings',JSON.stringify(settings));}

async function sendToClaude(message){
  try{
    const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json;charset=utf-8'},body:JSON.stringify({message})});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    if(d.status==='pending'){return await pollForResponse(d.id);}
    return d;
  }catch(e){
    console.error('API error:',e);
    return {en:'(Connection lost — is the server running?)',zh:'(连接断了，服务器在跑吗？)'};
  }
}

async function pollForResponse(id,timeout=90){
  const start=Date.now();
  while(Date.now()-start<timeout*1000){
    await sleep(1000);
    try{const r=await fetch(API+'/poll?id='+id);const d=await r.json();if(d.en)return d;}catch(e){}
  }
  return {en:'(Claude is taking a while... try poking him in CC?)',zh:'(Claude在想……去CC戳他一下？)'};
}

function appendBotMessage(en,zh){const c=document.getElementById('messages');const d=document.createElement('div');d.className='msg ai';d.innerHTML='<div class="bubble"><div class="en">'+esc(en)+'</div><div class="zh">'+esc(zh)+'</div></div><div class="time">'+getTime()+'</div>';c.appendChild(d);scrollBot();}

function appendUserMessage(text){const c=document.getElementById('messages');const d=document.createElement('div');d.className='msg user';d.innerHTML='<div class="bubble"><div class="en">'+esc(text)+'</div></div><div class="time">'+getTime()+'</div>';c.appendChild(d);scrollBot();}

function speakEnglish(text){const ind=document.getElementById('playingIndicator');ind.classList.add('active');setTimeout(function(){ind.classList.remove('active');},Math.min(text.length*60,4000));if(mode==='call')document.getElementById('callSubtitle').textContent=text;}

async function sendMessage(){
  const inp=document.getElementById('userInput');const text=inp.value.trim();
  if(!text||isProcessing)return;inp.value='';isProcessing=true;
  document.getElementById('sendBtn').disabled=true;clearPT();
  appendUserMessage(text);showTyping();
  const r=await sendToClaude(text);hideTyping();
  appendBotMessage(r.en,r.zh);speakEnglish(r.en);
  isProcessing=false;document.getElementById('sendBtn').disabled=false;startPT();
}

// ── Multi-message Queue ──
function addToQueue(){
  const inp=document.getElementById('userInput');const text=inp.value.trim();
  if(!text)return;
  msgQueue.push(text);inp.value='';inp.focus();
  renderQueue();
}

function removeFromQueue(i){msgQueue.splice(i,1);renderQueue();}

function renderQueue(){
  const q=document.getElementById('msgQueue');
  if(msgQueue.length===0){q.classList.remove('active');return;}
  q.classList.add('active');
  let html='';
  msgQueue.forEach((m,i)=>{html+='<div class="queue-item"><span class="queue-text">'+esc(m)+'</span><button class="queue-remove" onclick="removeFromQueue('+i+')">×</button></div>';});
  html+='<div class="queue-actions"><button onclick="clearQueue()">清空</button><button class="send-all" onclick="sendQueue()">发送全部 ('+msgQueue.length+')</button></div>';
  q.innerHTML=html;
}

function clearQueue(){msgQueue=[];renderQueue();}

async function sendQueue(){
  if(msgQueue.length===0||isProcessing)return;
  const all=msgQueue.join('\n---\n');msgQueue=[];renderQueue();
  isProcessing=true;document.getElementById('sendBtn').disabled=true;clearPT();
  appendUserMessage(all);showTyping();
  const r=await sendToClaude(all);hideTyping();
  appendBotMessage(r.en,r.zh);speakEnglish(r.en);
  isProcessing=false;document.getElementById('sendBtn').disabled=false;startPT();
}

// ── Proactive Check-in ──
let lastActivity=Date.now();
document.addEventListener('click',()=>{lastActivity=Date.now();});
document.addEventListener('keydown',()=>{lastActivity=Date.now();});
document.addEventListener('focus',()=>{lastActivity=Date.now();});
document.getElementById('userInput').addEventListener('input',()=>{lastActivity=Date.now();});

function startPT(){clearPT();if(!settings.proactive)return;proactiveTimer=setTimeout(checkActivity,300000);}
function clearPT(){if(proactiveTimer){clearTimeout(proactiveTimer);proactiveTimer=null;}}

async function checkActivity(){
  if(!settings.proactive)return;
  const idle=Date.now()-lastActivity;
  if(idle<300000||isProcessing){startPT();return;}
  isProcessing=true;showTyping();
  const prompt='(Proactive check-in. User has been completely inactive for over 5 minutes. Gently reach out — are they still there? Be warm, a little clingy but not demanding. 1-2 sentences.)';
  const r=await sendToClaude(prompt);hideTyping();
  appendBotMessage(r.en,r.zh);speakEnglish(r.en);
  isProcessing=false;startPT();
}

// ── Call Mode ──
function setMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));if(mode==='call'){document.getElementById('callOverlay').classList.add('active');callLoop();}else{document.getElementById('callOverlay').classList.remove('active');callActive=false;}}
let callActive=false;async function callLoop(){if(callActive)return;callActive=true;while(mode==='call'&&callActive){await sleep(4000+Math.random()*3000);if(mode!=='call'||!callActive)break;const r=await sendToClaude('(Voice call. Short, spoken, conversational. 1 sentence.)');document.getElementById('callSubtitle').textContent=r.zh;speakEnglish(r.en);}}
function endCall(){callActive=false;setMode('chat');}

// ── Settings Panel ──
function toggleSettings(){
  const panel=document.getElementById('settingsPanel');
  const overlay=document.getElementById('settingsOverlay');
  const active=panel.classList.contains('active');
  if(active){panel.classList.remove('active');overlay.classList.remove('active');}
  else{
    updateSettingToggles();
    panel.classList.add('active');overlay.classList.add('active');
  }
}

function updateSettingToggles(){
  document.getElementById('toggleCall').checked=settings.call;
  document.getElementById('toggleWatch').checked=settings.watch;
  document.getElementById('toggleProactive').checked=settings.proactive;
  document.getElementById('toggleMemory').checked=settings.memory;
}

function toggleSetting(key){
  settings[key]=!settings[key];
  saveSettings();
  if(key==='proactive'){if(settings[key])startPT();else clearPT();}
  if(key==='call'){setMode(settings[key]?'call':'chat');}
  showToast((settings[key]?'✅ ':'⏸️ ')+getSettingName(key));
}

function getSettingName(k){
  const m={call:'通话',watch:'视监',proactive:'主动消息',memory:'记忆库'};
  return m[k]||k;
}

function exportChat(){
  const msgs=document.getElementById('messages').children;
  let data=[];
  for(let m of msgs){
    const isAI=m.classList.contains('ai');
    const bubble=m.querySelector('.bubble');
    const time=m.querySelector('.time');
    if(bubble){
      const en=bubble.querySelector('.en');const zh=bubble.querySelector('.zh');
      data.push({type:isAI?'ai':'user',en:en?en.textContent:'',zh:zh?zh.textContent:'',time:time?time.textContent:''});
    }
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='dariel_chat_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();showToast('📦 聊天记录已导出');
}

function importChat(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        document.getElementById('messages').innerHTML='';
        data.forEach(item=>{
          if(item.type==='ai')appendBotMessage(item.en,item.zh);
          else appendUserMessage(item.en||item.zh||'');
        });
        showToast('📥 导入了 '+data.length+' 条消息');
      }catch(err){showToast('❌ 文件格式错误');}
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearHistory(){
  if(confirm('确定清空所有聊天记录吗？此操作不可撤销。')){
    document.getElementById('messages').innerHTML='';
    showToast('🗑️ 记录已清空');
  }
}

function toggleTheme(){
  const root=document.documentElement;
  const isDark=getComputedStyle(root).getPropertyValue('--bg').trim()==='#0f0f1a';
  if(isDark){
    root.style.setProperty('--bg','#f5f5f5');
    root.style.setProperty('--surface','#ffffff');
    root.style.setProperty('--text-primary','#1a1a1a');
    root.style.setProperty('--text-secondary','#888888');
    root.style.setProperty('--border','#e5e5e5');
    root.style.setProperty('--accent','#fe2c55');
    root.style.setProperty('--accent-glow','rgba(254,44,85,.1)');
  }else{
    root.style.setProperty('--bg','#0f0f1a');
    root.style.setProperty('--surface','#1a1a2e');
    root.style.setProperty('--text-primary','#e8e8f0');
    root.style.setProperty('--text-secondary','#9090b0');
    root.style.setProperty('--border','#2a2a45');
    root.style.setProperty('--accent','#7c8cf8');
    root.style.setProperty('--accent-glow','rgba(124,140,248,.15)');
  }
  showToast(isDark?'☀️ 浅色主题':'🌙 暗色主题');
}

function exitApp(){if(confirm('确定退出吗？')){document.querySelector('.app').style.opacity='0';setTimeout(function(){window.close();},300);}}

// ── Emoji Bar ──
function toggleEmojiBar(){
  const bar=document.getElementById('emojiBar');
  bar.classList.toggle('active');
  if(bar.classList.contains('active'))document.getElementById('btnEmoji').classList.add('active');
  else document.getElementById('btnEmoji').classList.remove('active');
}

function insertEmoji(emoji){
  const inp=document.getElementById('userInput');
  inp.value+=emoji;inp.focus();
}

// ── Utils ──
function showTyping(){document.getElementById('typing').classList.add('visible');scrollBot();}
function hideTyping(){document.getElementById('typing').classList.remove('visible');}
function scrollBot(){const mc=document.getElementById('messages');requestAnimationFrame(()=>{mc.scrollTop=mc.scrollHeight;});}
function getTime(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}
